<div class="p-4 bg-blue-900/50 border-r-10 border-l-10 border-b-10" >
  <h6>Child Component</h6>
  <p>This is the child component. It is displayed inside the parent component.</p>
  <div class="bg-blue-300/50 border-1 border-blue-700 rounded p-4 my-4">
    <p>Child owns value <span>{{value}}</span></p>
    <button class="bg-blue-700 text-white border-1 rounded px-4 py-2" (click)="increaseValue()">+</button>
  </div>

  <p> values is from parent component <span> {{score}}</span></p>
  <div class="mt-4">
    <button class="bg-yellow-700 text-white border-1 rounded px-4 py-2" (click)="onButtonClick()">Change Parent Value</button>
    </div>
</div>
